name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  check-pr-lines:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - uses: trade-tariff/trade-tariff-tools/.github/actions/check-pr-lines@main
        with:
          threshold: 600
          exclude-paths: |
            db/
            data/
            docs/
            terraform/versions.tf
            *.md
            *.lock
            .github

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/cache@v6.1.0
        with:
          path: ~/.cache/pre-commit
          key: ${{ runner.os }}-pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pre-commit-
      - uses: actions/setup-python@v6.3.0
        with:
          python-version: '3'
      - uses: ruby/setup-ruby@v1.316.0
        with:
          bundler-cache: true
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.12
      - uses: trade-tariff/trade-tariff-tools/.github/actions/setup-tflint@main
      - uses: trade-tariff/trade-tariff-tools/.github/actions/setup-ssh@main
        with:
          ssh-key: ${{ secrets.PRIVATE_SSH_KEY }}
      - uses: trade-tariff/trade-tariff-tools/.github/actions/setup-terraform-docs@main
        with:
          terraform_docs_version: 0.22.0
      - run: cd terraform/ && terraform init -backend=false -reconfigure
      - run: pip install pre-commit
      - run: pre-commit run --all-files --hook-stage pre-commit
      - run: pre-commit run --all-files --hook-stage pre-push
      - run: bundle exec brakeman

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: ruby/setup-ruby@v1.316.0
        with:
          bundler-cache: true

      - run: bundle exec rspec
